<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนกิจกรรม</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
    .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    h2, h3 { text-align: center; color: #333; margin-bottom: 10px; }
    
    .btn-activity { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-align: left; }
    .btn-activity:hover { background-color: #0056b3; }
    .btn-activity.closed { background-color: #999; } 
    .btn-activity.registered { background-color: #17a2b8; border-left: 5px solid #0b2e13; } 
    
    .activity-details { background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; color: #333; }
    .activity-details p { margin: 5px 0; }
    
    label { font-weight: bold; display: block; margin-top: 15px; }
    .radio-group { margin: 10px 0; }
    input[type="file"] { margin-top: 10px; width: 100%; }
    
    .btn-submit { width: 100%; padding: 15px; background-color: #06C755; color: white; border: none; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    .btn-submit:disabled { background-color: #cccccc; cursor: not-allowed; }
    .btn-back { width: 100%; padding: 10px; background-color: #6c757d; color: white; border: none; font-size: 14px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    
    #status, #activityStatusMsg { margin-top: 10px; font-weight: bold; text-align: center; }
    #activityListScreen, #registrationScreen { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div id="loadingScreen">
      <h3 style="color: gray;">กำลังเตรียมข้อมูลกิจกรรม...</h3>
    </div>

    <div id="activityListScreen">
      <h2>เลือกกิจกรรมที่ต้องการ</h2>
      <div id="activityContainer"></div>
    </div>

    <div id="registrationScreen">
      <h3 id="displayActivityName">ชื่อกิจกรรม</h3>
      
      <div class="activity-details">
        <p><strong>📅 วันที่:</strong> <span id="dispDate"></span></p>
        <p><strong>⏰ เวลา:</strong> <span id="dispTime"></span></p>
        <p><strong>📍 สถานที่:</strong> <span id="dispLoc"></span></p>
        <p id="dispDescContainer"><strong>📝 รายละเอียด:</strong> <span id="dispDesc"></span></p>
      </div>

      <p id="activityStatusMsg"></p> 
      
      <div id="interactionArea">
        <label>การเข้าร่วมกิจกรรม:</label>
        <div class="radio-group">
          <input type="radio" id="joinYes" name="joinStatus" value="เข้า" onchange="toggleForm()"> 
          <label for="joinYes" id="lblJoinYes" style="display:inline; font-weight:normal;">เข้าร่วม</label> <br><br>
          
          <input type="radio" id="joinNo" name="joinStatus" value="ไม่เข้า" onchange="toggleForm()"> 
          <label for="joinNo" style="display:inline; font-weight:normal;">ไม่เข้าร่วม</label>
        </div>

        <div id="fileUploadSection" style="display:none;">
          <label>แนบไฟล์หลักฐาน/เหตุผลที่ไม่เข้าร่วม (PDF, JPG, PNG):</label>
          <input type="file" id="fileInput" accept=".pdf, .jpg, .jpeg, .png">
        </div>

        <button id="submitBtn" class="btn-submit" onclick="submitRegistration()" disabled>ลงทะเบียน</button>
      </div>

      <button id="btnBackToList" class="btn-back" onclick="goBack()">ย้อนกลับไปเลือกกิจกรรม</button>

      <div id="status"></div>
    </div>
  </div>

  <script>
    // ⚠️ อย่าลืมใส่ LIFF ID และ Web App URL ของคุณ!
    const MY_LIFF_ID = "ใส่_LIFF_ID_กิจกรรมที่นี่"; 
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzvHM4o5uGr8-GC8c1cXIRNCguT-Hgm6SS_Ys4qADQkmrfIRZfPQawJzpdfUUFf_359/exec"; 

    let userLineId = "";
    let selectedActivity = "";

    async function main() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        userLineId = profile.userId;
        fetchActivities();
      } catch (err) {
        document.getElementById('loadingScreen').innerHTML = `<h3 style="color:red;">Error: ${err.message}</h3>`;
      }
    }

    async function fetchActivities() {
      try {
        const checkUrl = `${GAS_API_URL}?action=getActivities&userId=${userLineId}&t=${new Date().getTime()}`;
        const response = await fetch(checkUrl);
        const res = await response.json();

        if (res.status === 'success' && res.data.length > 0) {
          const container = document.getElementById('activityContainer');
          container.innerHTML = ""; 
          const registeredActivities = res.registered || [];

          // 🌟 เช็คว่ามาจาก QR Code กิจกรรมเฉพาะหรือไม่ (เช็คคำว่า ?event=...)
          const urlParams = new URLSearchParams(window.location.search);
          const eventParam = urlParams.get('event');

          // สร้างปุ่มหน้าแรกรอไว้ก่อน
          res.data.forEach(activity => {
            const btn = document.createElement('button');
            const safeStatus = activity.status || ""; 
            const checkStatus = safeStatus.trim();
            const isClosed = checkStatus === "ปิดรับ" || checkStatus === "ปิด" || checkStatus === "ไม่เปิดรับ";
            
            const isRegistered = registeredActivities.includes(activity.name);
            
            if (isRegistered) {
              btn.className = 'btn-activity registered';
              btn.innerText = `✅ ${activity.name} (คุณลงทะเบียนแล้ว)`;
            } else if (isClosed) {
              btn.className = 'btn-activity closed';
              btn.innerText = `📌 ${activity.name} (ปิดรับแล้ว)`;
            } else {
              btn.className = 'btn-activity';
              btn.innerText = `📌 ${activity.name}`;
            }
            
            btn.onclick = () => openRegistrationForm(activity, isRegistered);
            container.appendChild(btn);
          });

          // 🌟 ถ้ามี eventParam ส่งมา ให้เด้งข้ามไปหน้าฟอร์มของกิจกรรมนั้นเลย
          if (eventParam) {
            // ค้นหากิจกรรมที่มีคำว่า event=... อยู่ในลิงก์คอลัมน์ H
            const targetActivity = res.data.find(act => act.link.includes(`event=${eventParam}`));
            if (targetActivity) {
              const isRegistered = registeredActivities.includes(targetActivity.name);
              openRegistrationForm(targetActivity, isRegistered);
              
              // ซ่อนปุ่มย้อนกลับ เพื่อไม่ให้คนสแกนหน้างานกดย้อนไปดูกิจกรรมอื่นได้
              document.getElementById('btnBackToList').style.display = 'none';
              
              document.getElementById('loadingScreen').style.display = 'none';
              return; // หยุดการทำงานตรงนี้เลย
            }
          }

          // ถ้าไม่ได้สแกน QR Code (เข้าจากริชเมนูปกติ) ให้โชว์หน้า List ปกติ
          document.getElementById('btnBackToList').style.display = 'block'; // มั่นใจว่าเปิดปุ่มย้อนกลับ
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('activityListScreen').style.display = 'block';
        } else {
          document.getElementById('loadingScreen').innerHTML = "<h3>ไม่มีกิจกรรมในขณะนี้</h3>";
        }
      } catch (error) {
        document.getElementById('loadingScreen').innerHTML = `<h3 style="color:red;">ดึงข้อมูลล้มเหลว: ${error.message}</h3>`;
      }
    }

    function openRegistrationForm(activity, isRegistered) {
      selectedActivity = activity.name;
      document.getElementById('displayActivityName').innerText = `กิจกรรม: ${activity.name}`;
      
      document.getElementById('dispDate').innerText = activity.date;
      document.getElementById('dispTime').innerText = activity.time;
      document.getElementById('dispLoc').innerText = activity.location;
      
      if (activity.desc && activity.desc.trim() !== "") {
        document.getElementById('dispDesc').innerText = activity.desc;
        document.getElementById('dispDescContainer').style.display = 'block';
      } else {
        document.getElementById('dispDescContainer').style.display = 'none';
      }

      const safeStatus = activity.status || "";
      const statusMsg = document.getElementById('activityStatusMsg');
      const interactionArea = document.getElementById('interactionArea'); 

      const checkStatus = safeStatus.trim();
      
      if (isRegistered) {
        statusMsg.innerText = "✅ คุณได้บันทึกการเข้าร่วมกิจกรรมนี้ไปแล้ว";
        statusMsg.style.color = "#17a2b8"; 
        interactionArea.style.display = "none"; 
      } else if (checkStatus === "ปิดรับ" || checkStatus === "ปิด" || checkStatus === "ไม่เปิดรับ") {
        statusMsg.innerText = "❌ กิจกรรมนี้ปิดรับการลงทะเบียนเข้าร่วมแล้ว";
        statusMsg.style.color = "red";
        interactionArea.style.display = "none";
      } else {
        statusMsg.innerText = "✅ เปิดรับลงทะเบียน";
        statusMsg.style.color = "green";
        interactionArea.style.display = "block";
        document.getElementById('joinYes').checked = false;
        document.getElementById('joinNo').checked = false;
      }
      
      document.getElementById('fileInput').value = "";
      toggleForm(); 

      document.getElementById('activityListScreen').style.display = 'none';
      document.getElementById('registrationScreen').style.display = 'block';
    }

    function goBack() {
      document.getElementById('status').innerText = "";
      document.getElementById('registrationScreen').style.display = 'none';
      document.getElementById('activityListScreen').style.display = 'block';
    }

    function toggleForm() {
      const isJoin = document.getElementById('joinYes').checked;
      const isNotJoin = document.getElementById('joinNo').checked;
      const fileSection = document.getElementById('fileUploadSection');
      const submitBtn = document.getElementById('submitBtn');

      if (isNotJoin) {
        fileSection.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = "ยืนยันการไม่เข้าร่วม (แนบเหตุผล)";
      } else if (isJoin) {
        fileSection.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.innerText = "ยืนยันการเข้าร่วม";
      } else {
        submitBtn.disabled = true;
        fileSection.style.display = 'none';
        submitBtn.innerText = "ลงทะเบียน";
      }
    }

    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]); 
        reader.onerror = error => reject(error);
      });
    }

    async function submitRegistration() {
      const statusDiv = document.getElementById('status');
      const fileInput = document.getElementById('fileInput');
      const isNotJoin = document.getElementById('joinNo').checked;
      
      let base64Data = "";
      let fileName = "";
      let mimeType = "";
      let joinStatusText = isNotJoin ? "ไม่เข้า" : "เข้า";
      
      if (isNotJoin) {
        if (fileInput.files.length === 0) {
          statusDiv.innerText = "❌ กรุณาแนบไฟล์หลักฐาน/เหตุผลที่ไม่เข้าร่วม";
          statusDiv.style.color = "red";
          return;
        }
        const file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) {
          statusDiv.innerText = "❌ ไฟล์ใหญ่เกินไป (กรุณาใช้ไฟล์ไม่เกิน 5MB)";
          statusDiv.style.color = "red";
          return;
        }
        statusDiv.innerText = "กำลังอัปโหลดไฟล์เหตุผลและบันทึกข้อมูล...";
        base64Data = await getBase64(file);
        fileName = file.name;
        mimeType = file.type;
      } else {
        statusDiv.innerText = "กำลังบันทึกข้อมูลการเข้าร่วม...";
      }

      statusDiv.style.color = "blue";
      document.getElementById('submitBtn').disabled = true;

      try {
        const payload = {
          lineUserId: userLineId,
          activityName: selectedActivity,
          joinStatus: joinStatusText,
          fileName: fileName,
          mimeType: mimeType,
          fileBase64: base64Data
        };

        const response = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const res = await response.json();

        if (res.status === 'success') {
          statusDiv.innerText = "✅ บันทึกข้อมูลสำเร็จ!";
          statusDiv.style.color = "green";
          
          setTimeout(() => { liff.closeWindow(); }, 2000);
        } else {
          statusDiv.innerText = "❌ เกิดข้อผิดพลาด: " + res.message;
          statusDiv.style.color = "red";
          document.getElementById('submitBtn').disabled = false;
        }

      } catch (error) {
        statusDiv.innerText = "❌ Error: " + error.message;
        statusDiv.style.color = "red";
        document.getElementById('submitBtn').disabled = false;
      }
    }

    main();
  </script>
</body>
</html>
